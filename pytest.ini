[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short --cov=src --cov-report=term-missing --cov-report=html
filterwarnings =
    ignore::DeprecationWarning
env =
    OPENAI_API_KEY=test-key
    QDRANT_HOST=localhost
    QDRANT_PORT=6333